<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>Tp Final (RYM Analisis)</title>
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>

    <body>
        
        <div class="container mt-4">
        
            <!-- Barra de Navegación Global -->
            <div class="row mb-4">
              <div class="col-md-4 mb-2">
                {% if request.path == '/data' %}
                  <a href="/" class="btn btn-secondary w-100">🏠 Volver</a>
                {% else %}
                  <a href="/data" class="btn btn-primary w-100">📊 Ver Datos</a>
                {% endif %}
              </div>
              <div class="col-md-4 mb-2">
                {% if request.path == '/analysis' %}
                  <a href="/" class="btn btn-secondary w-100">🏠 Volver</a>
                {% else %}
                  <a href="/analysis" class="btn btn-success w-100">📈 Análisis</a>
                {% endif %}
              </div>
              <div class="col-md-4 mb-2">
                {% if request.path == '/recommend' %}
                  <a href="/" class="btn btn-secondary w-100">🏠 Volver</a>
                {% else %}
                  <a href="/recommend" class="btn btn-warning w-100">🎯 Recomendador</a>
                {% endif %}
              </div>
            </div>

        
            {% block content %}
            
            {% endblock %}
        
        </div>
    <!-- Bootstrap JS Bundle for interactive components like Carousel -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
    
</html>
