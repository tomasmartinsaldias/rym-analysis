<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 5000 Albums</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

    <div class="container mt-4">

        <h1 class="text-center mb-4">🎵 Top Albums</h1>

        <div class="text-center mb-3">
            <a href="/grafico" class="btn btn-primary">Ver gráfico</a>
        </div>

        <div class="table-responsive">
            
            <table class="table table-dark table-striped table-hover">
                
                <thead>
                    <tr>
                        <th>Artista</th>
                        <th>Álbum</th>
                        <th>Año</th>
                        <th>Rating</th>
                        <th>Géneros</th>
                    </tr>
                </thead>
            
                <tbody>
                
                    {% for album in albums %}
                
                        <tr>
                            <td>{{ album["Artist Name"] }}</td>
                            <td>{{ album["Album Name"] }}</td>
                            <td>{{ album["Release Date"] }}</td>
                            <td>{{ album["Average Rating"] }}</td>
                            <td>{{ album["Genres"] }}</td>
                        </tr>
                
                    {% endfor %}
            
                </tbody>
        
            </table>
    
        </div>

    </div>

</div>
</body>
</html>
